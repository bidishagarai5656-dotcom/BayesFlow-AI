services:
  - type: web
    name: bayesflow-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install -g pnpm@9 && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build && pip3 install -r artifacts/api-server/requirements.txt && pnpm --filter @workspace/db run push-force
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PYTHON_BIN
        value: python3
      - key: CORS_ORIGIN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: bayesflow-db
          property: connectionString

databases:
  - name: bayesflow-db
    plan: free
    region: oregon
