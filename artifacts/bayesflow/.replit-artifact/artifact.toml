kind = "web"
previewPath = "/"
title = "BayesFlow AI"
version = "1.0.0"
id = "artifacts/bayesflow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25242

[services.development]
run = "pnpm --filter @workspace/bayesflow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bayesflow", "run", "build" ]
publicDir = "artifacts/bayesflow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25242"
BASE_PATH = "/"
